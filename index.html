<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unibrecho </title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <h1>Unibrecho</h1>
    <p>Bem-vindo ao Unibrecho, o sistema de gerenciamento de repositórios!</p>
    <p>Aqui você pode criar, editar e gerenciar seus repositórios de forma fácil e eficiente.</p>
    <hr>
    <li>
        <input placeholder="Buscar">
        <form>
            <label for="Roupas">Escolha uma estilo</label>
            <select name="Roupas" id="Roupas">
                <option value="Casual">Casual</option>
                <option value="Esportivo">Esportivo</option>
                <option value="Formal">Formal</option>
        </form>
        <input type="submit" value="Pesquisar">
        <input type="submit" value="Notificações">
        <input type="submit" value="Entrar">
        <input type="submit" value="Anunciar">
    </li>
    <hr>
</body>
</html>
